<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz Exam Game</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #4f46e5, #9333ea);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      background: #ffffff;
      padding: 24px;
      width: 380px;
      border-radius: 16px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      animation: fadeIn 0.6s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    h2 {
      text-align: center;
      color: #4f46e5;
      margin-bottom: 10px;
    }
    p { text-align: center; color: #555; }
    select, button {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      font-size: 16px;
      border-radius: 10px;
      border: 1px solid #ddd;
      outline: none;
    }
    select:focus {
      border-color: #4f46e5;
    }
    button {
      background: linear-gradient(135deg, #4f46e5, #6366f1);
      color: #fff;
      border: none;
      cursor: pointer;
      font-weight: 600;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 15px rgba(79,70,229,0.4);
    }
    .timer {
      text-align: right;
      font-weight: bold;
      color: #dc2626;
      margin-bottom: 8px;
    }
    .option {
      background: #f9fafb;
      padding: 10px 12px;
      margin: 8px 0;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s ease;
    }
    .option:hover {
      background: #eef2ff;
    }
    .score {
      text-align: center;
      font-size: 20px;
      font-weight: 600;
      color: #16a34a;
    }
  </style>
</head>
<body>

  <!-- HOME SCREEN -->
  <div class="container" id="homeScreen">
    <h2>Quiz Examination System</h2>
    <p>Select a mode to begin</p>
    <button onclick="goToSubject('exam')">Start Exam</button>
    <button onclick="goToSubject('practice')">Practice Mode</button>
  </div>

  <!-- SUBJECT SELECTION -->
  <div class="container" id="subjectScreen" style="display:none">
    <h2>Select Subject</h2>
    <select id="subject">
      <option value="">-- Choose Subject --</option>
      <option value="programming">Programming</option>
      <option value="core">Core CS</option>
      <option value="aptitude">Aptitude</option>
      <option value="mixed">Mixed</option>
    </select>
    <button onclick="startQuiz()">Continue</button>
  </div>

  <!-- QUIZ SCREEN -->
  <div class="container" id="quizScreen" style="display:none">
    <div class="timer" id="timer">Time: 15s</div>
    <h2 id="question"></h2>
    <div id="options"></div>
    <button onclick="nextQuestion()">Next</button>
  </div>

  <script>
    let mode = 'exam';

    function goToSubject(selectedMode) {
      mode = selectedMode;
      document.getElementById('homeScreen').style.display = 'none';
      document.getElementById('subjectScreen').style.display = 'block';
    }

    const questions = {
      programming: [
        { question: 'What does HTML stand for?', options: ['Hyper Text Markup Language', 'High Text ML', 'Hyper Tool ML', 'Home Text ML'], correct: 0 },
        { question: 'Which tag is used for paragraph?', options: ['<div>', '<p>', '<h1>', '<span>'], correct: 1 },
        { question: 'CSS is used for?', options: ['Structure', 'Styling', 'Logic', 'Database'], correct: 1 }
      ],
      core: [
        { question: 'Which data structure uses FIFO?', options: ['Stack', 'Queue', 'Tree', 'Graph'], correct: 1 },
        { question: 'Which is an OS?', options: ['Oracle', 'Linux', 'Chrome', 'MySQL'], correct: 1 },
        { question: 'SQL is used for?', options: ['Styling', 'Networking', 'Database', 'OS'], correct: 2 }
      ],
      aptitude: [
        { question: 'What is 10% of 200?', options: ['10', '20', '30', '40'], correct: 1 },
        { question: 'If 5x = 20, x = ?', options: ['2', '3', '4', '5'], correct: 2 },
        { question: 'Average of 2 and 4?', options: ['2', '3', '4', '6'], correct: 1 }
      ],
      mixed: []
    };

    // combine all subjects for mixed
    questions.mixed = [...questions.programming, ...questions.core, ...questions.aptitude];

    questions.mixed = [...questions.programming, ...questions.core, ...questions.aptitude];

    let quizData = [];
    let currentQuestion = 0;
    let score = 0;
    let timeLeft = 15;
    let timer;

    const questionEl = document.getElementById('question');
    const optionsEl = document.getElementById('options');
    const timerEl = document.getElementById('timer');

    function startQuiz() {
      const subject = document.getElementById('subject').value;
      if (!subject) {
        alert('Please select a subject');
        return;
      }
      quizData = questions[subject];
      document.getElementById('subjectScreen').style.display = 'none';
      document.getElementById('quizScreen').style.display = 'block';
      loadQuestion();
    }

    function startTimer() {
      timeLeft = 15;
      timerEl.innerText = `Time: ${timeLeft}s`;
      timer = setInterval(() => {
        timeLeft--;
        timerEl.innerText = `Time: ${timeLeft}s`;
        if (timeLeft === 0) {
          clearInterval(timer);
          nextQuestion();
        }
      }, 1000);
    }

    function loadQuestion() {
      clearInterval(timer);
      startTimer();
      const q = quizData[currentQuestion];
      questionEl.innerText = q.question;
      optionsEl.innerHTML = '';
      q.options.forEach((opt, i) => {
        const div = document.createElement('div');
        div.className = 'option';
        div.innerHTML = `<input type='radio' name='answer' value='${i}'> ${opt}`;
        optionsEl.appendChild(div);
      });
    }

    function nextQuestion() {
      clearInterval(timer);
      const selected = document.querySelector('input[name="answer"]:checked');
      if (selected && parseInt(selected.value) === quizData[currentQuestion].correct) {
        score++;
      }
      currentQuestion++;
      if (currentQuestion < quizData.length) {
        loadQuestion();
      } else {
        document.getElementById('quizScreen').innerHTML = `<div class='score'>Final Score: ${score}</div>`;
      }
    }
  </script>
</body>
</html>
